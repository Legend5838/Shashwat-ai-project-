{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h2>Verify OTP</h2>

    <form method="post">
        <input type="text" name="otp" placeholder="Enter OTP" required>
        <input type="password" name="new_password" placeholder="New Password" required>
        <button type="submit">Reset Password</button>
    </form>
</div>
{% endblock %}
